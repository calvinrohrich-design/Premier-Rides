workflows:
  ios-workflow:
    name: Premier Rides iOS
    max_build_duration: 120
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.ewpremierrides.app
      node: 18.17.0
      xcode: latest
    scripts:
      - name: Install Capacitor CLI
        script: |
          npm install -g @capacitor/cli

      - name: Create Capacitor project wrapping live app
        script: |
          cat > package.json << 'PKGJSON'
          {
            "name": "premier-rides",
            "version": "1.0.0",
            "dependencies": {
              "@capacitor/core": "^6.0.0",
              "@capacitor/ios": "^6.0.0",
              "@capacitor/cli": "^6.0.0"
            }
          }
          PKGJSON

          cat > capacitor.config.json << 'CAPJSON'
          {
            "appId": "com.ewpremierrides.app",
            "appName": "Premier Rides",
            "webDir": "www",
            "server": {
              "url": "https://ewpremierrides.com",
              "cleartext": false
            }
          }
          CAPJSON

          mkdir -p www
          echo '<html><body>Loading...</body></html>' > www/index.html

          npm install
          npx cap add ios
          npx cap sync ios

      - name: Set up code signing
        script: xcode-project use-profiles

      - name: Build IPA
        script: |
          xcodebuild -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath build/App.xcarchive \
            archive

          xcodebuild -exportArchive \
            -archivePath build/App.xcarchive \
            -exportOptionsPlist ios/App/exportOptions.plist \
            -exportPath build/ios/ipa

      - name: Create exportOptions.plist if missing
        script: |
          mkdir -p ios/App
          cat > ios/App/exportOptions.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>W5LLQF9YHT</string>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          PLIST

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - build/App.xcarchive
