workflows:
  ios-workflow:
    name: Premier Rides iOS
    max_build_duration: 120
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.ewpremierrides.app
      node: 18.17.0
    scripts:
      - name: Install Node dependencies
        script: |
          npm install -g @capacitor/cli
          npm install @capacitor/core @capacitor/ios @capacitor/app @capacitor/haptics @capacitor/keyboard @capacitor/status-bar

      - name: Create Capacitor project wrapping live app
        script: |
          # Create a minimal package.json
          cat > package.json << 'EOF'
          {
            "name": "premier-rides",
            "version": "1.0.0",
            "description": "Premier Rides",
            "dependencies": {
              "@capacitor/core": "^6.0.0",
              "@capacitor/ios": "^6.0.0",
              "@capacitor/cli": "^6.0.0"
            }
          }
          EOF

          # Create capacitor config pointing to live URL
          cat > capacitor.config.json << 'EOF'
          {
            "appId": "com.ewpremierrides.app",
            "appName": "Premier Rides",
            "webDir": "www",
            "server": {
              "url": "https://ewpremierrides.com",
              "cleartext": false
            }
          }
          EOF

          # Create minimal www/index.html so Capacitor doesn't complain
          mkdir -p www
          echo '<html><body>Loading...</body></html>' > www/index.html

          npm install
          npx cap add ios
          npx cap sync ios

      - name: Set up code signing
        script: xcode-project use-profiles

      - name: Build IPA
        script: |
          xcode-build-and-archive \
            -workspace ios/App/App.xcworkspace \
            -scheme App

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
