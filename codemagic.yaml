workflows:
  ios-workflow:
    name: Premier Rides iOS
    max_build_duration: 120
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.ewpremierrides.app
      node: 18.17.0
      xcode: latest
    integrations:
      app_store_connect: Premier Rides Key
    scripts:
      - name: Install Capacitor CLI
        script: |
          npm install -g @capacitor/cli

      - name: Create Capacitor project wrapping live app
        script: |
          cat > package.json << 'PKGJSON'
          {
            "name": "premier-rides",
            "version": "1.0.0",
            "dependencies": {
              "@capacitor/core": "^6.0.0",
              "@capacitor/ios": "^6.0.0",
              "@capacitor/cli": "^6.0.0"
            }
          }
          PKGJSON

          cat > capacitor.config.json << 'CAPJSON'
          {
            "appId": "com.ewpremierrides.app",
            "appName": "Premier Rides",
            "webDir": "www",
            "server": {
              "url": "https://ewpremierrides.com",
              "cleartext": false
            }
          }
          CAPJSON

          mkdir -p www
          echo '<html><body>Loading...</body></html>' > www/index.html

          npm install
          npx cap add ios
          npx cap sync ios

      - name: Set up code signing
        script: xcode-project use-profiles

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace ios/App/App.xcworkspace \
            --scheme App

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - Internal Testers
