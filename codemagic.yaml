workflows:
  ios-workflow:
    name: Premier Rides iOS
    max_build_duration: 60
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.ewpremierrides.app
        provisioning_profile: Premier_rides_app_store
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build web app
        script: npx vite build
      - name: Install Capacitor
        script: |
          npm install @capacitor/core @capacitor/ios @capacitor/cli
          npx cap init "Premier Rides" com.ewpremierrides.app --web-dir dist
          npx cap add ios
          npx cap copy ios
      - name: Set up code signing
        script: xcode-project use-profiles
      - name: Build IPA
        script: |
          xcode-build-and-archive \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
